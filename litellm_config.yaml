model_list:
  # Gemini models mapped to common OpenAI model names
  - model_name: gpt-4o
    litellm_params:
      model: vertex_ai/gemini-2.0-flash
      vertex_project: os.environ/VERTEX_PROJECT_ID
      vertex_location: os.environ/VERTEX_LOCATION

  - model_name: gpt-4o-mini
    litellm_params:
      model: vertex_ai/gemini-2.0-flash-lite
      vertex_project: os.environ/VERTEX_PROJECT_ID
      vertex_location: os.environ/VERTEX_LOCATION

  - model_name: gpt-4-turbo
    litellm_params:
      model: vertex_ai/gemini-1.5-pro
      vertex_project: os.environ/VERTEX_PROJECT_ID
      vertex_location: os.environ/VERTEX_LOCATION

  - model_name: gpt-3.5-turbo
    litellm_params:
      model: vertex_ai/gemini-1.5-flash
      vertex_project: os.environ/VERTEX_PROJECT_ID
      vertex_location: os.environ/VERTEX_LOCATION

  # Gemini models with their native names
  - model_name: gemini-2.0-flash
    litellm_params:
      model: vertex_ai/gemini-2.0-flash
      vertex_project: os.environ/VERTEX_PROJECT_ID
      vertex_location: os.environ/VERTEX_LOCATION

  - model_name: gemini-2.0-flash-lite
    litellm_params:
      model: vertex_ai/gemini-2.0-flash-lite
      vertex_project: os.environ/VERTEX_PROJECT_ID
      vertex_location: os.environ/VERTEX_LOCATION

  - model_name: gemini-1.5-pro
    litellm_params:
      model: vertex_ai/gemini-1.5-pro
      vertex_project: os.environ/VERTEX_PROJECT_ID
      vertex_location: os.environ/VERTEX_LOCATION

  - model_name: gemini-1.5-flash
    litellm_params:
      model: vertex_ai/gemini-1.5-flash
      vertex_project: os.environ/VERTEX_PROJECT_ID
      vertex_location: os.environ/VERTEX_LOCATION

  # OpenAI GPT-OSS models on Vertex AI (MaaS)
  # LiteLLM route: vertex_ai/openai/{model} (NOT the full publishers/ path)
  # Available regions: us-central1, global
  - model_name: gpt-oss-120b
    litellm_params:
      model: vertex_ai/openai/gpt-oss-120b-maas
      vertex_project: os.environ/VERTEX_PROJECT_ID
      vertex_location: us-central1

  - model_name: publishers/openai/models/gpt-oss-120b-maas
    litellm_params:
      model: vertex_ai/openai/gpt-oss-120b-maas
      vertex_project: os.environ/VERTEX_PROJECT_ID
      vertex_location: us-central1

  - model_name: gpt-oss-20b
    litellm_params:
      model: vertex_ai/openai/gpt-oss-20b-maas
      vertex_project: os.environ/VERTEX_PROJECT_ID
      vertex_location: us-central1

  # Claude models on Vertex AI (Model Garden)
  - model_name: claude-sonnet-4-5
    litellm_params:
      model: vertex_ai/claude-sonnet-4-5@20250929
      vertex_project: os.environ/VERTEX_PROJECT_ID
      vertex_location: os.environ/VERTEX_LOCATION

  - model_name: claude-3-5-sonnet
    litellm_params:
      model: vertex_ai/claude-3-5-sonnet-v2@20241022
      vertex_project: os.environ/VERTEX_PROJECT_ID
      vertex_location: os.environ/VERTEX_LOCATION

  - model_name: claude-3-opus
    litellm_params:
      model: vertex_ai/claude-3-opus@20240229
      vertex_project: os.environ/VERTEX_PROJECT_ID
      vertex_location: os.environ/VERTEX_LOCATION

  - model_name: claude-3-haiku
    litellm_params:
      model: vertex_ai/claude-3-haiku@20240307
      vertex_project: os.environ/VERTEX_PROJECT_ID
      vertex_location: os.environ/VERTEX_LOCATION

litellm_settings:
  drop_params: true
  set_verbose: false
  num_retries: 3
  request_timeout: 600
