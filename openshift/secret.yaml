apiVersion: v1
kind: Secret
metadata:
  name: vertex-openai-proxy-credentials
  labels:
    app: vertex-openai-proxy
    app.kubernetes.io/name: vertex-openai-proxy
type: Opaque
stringData:
  # --- Required: Vertex AI configuration ---
  VERTEX_PROJECT_ID: "<YOUR_GCP_PROJECT_ID>"
  VERTEX_LOCATION: "us-east5"

  # --- Authentication (choose ONE of the three methods below) ---

  # Method 1a: Full credentials JSON - Service Account key file
  # GOOGLE_APPLICATION_CREDENTIALS_JSON: '{"type":"service_account","project_id":"...","private_key_id":"...","private_key":"-----BEGIN RSA PRIVATE KEY-----\n...\n-----END RSA PRIVATE KEY-----\n","client_email":"...@...iam.gserviceaccount.com","client_id":"...","auth_uri":"https://accounts.google.com/o/oauth2/auth","token_uri":"https://oauth2.googleapis.com/token","auth_provider_x509_cert_url":"https://www.googleapis.com/oauth2/v1/certs","client_x509_cert_url":"...","universe_domain":"googleapis.com"}'

  # Method 1b: Full credentials JSON - authorized_user (from gcloud auth application-default login)
  # GOOGLE_APPLICATION_CREDENTIALS_JSON: '{"account":"","client_id":"...","client_secret":"...","quota_project_id":"...","refresh_token":"...","type":"authorized_user","universe_domain":"googleapis.com"}'

  # Method 2: Individual fields (authorized_user only)
  GOOGLE_CLIENT_ID: "<YOUR_CLIENT_ID>"
  GOOGLE_CLIENT_SECRET: "<YOUR_CLIENT_SECRET>"
  GOOGLE_REFRESH_TOKEN: "<YOUR_REFRESH_TOKEN>"
  GOOGLE_QUOTA_PROJECT_ID: "<YOUR_QUOTA_PROJECT_ID>"

  # --- Optional: LiteLLM proxy authentication ---
  # LITELLM_MASTER_KEY: "sk-your-secret-key-here"
