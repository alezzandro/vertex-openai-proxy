apiVersion: v1
kind: Secret
metadata:
  name: proxy-api-keys
  namespace: openshift-lightspeed
type: Opaque
stringData:
  # This token must match the LITELLM_MASTER_KEY configured on the
  # vertex-openai-proxy deployment (in the vertex-openai-proxy-credentials secret).
  apitoken: "<YOUR_LITELLM_MASTER_KEY>"
