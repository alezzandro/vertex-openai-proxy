apiVersion: apps/v1
kind: Deployment
metadata:
  name: vertex-openai-proxy
  labels:
    app: vertex-openai-proxy
    app.kubernetes.io/name: vertex-openai-proxy
    app.kubernetes.io/component: proxy
    app.kubernetes.io/part-of: vertex-openai-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vertex-openai-proxy
  template:
    metadata:
      labels:
        app: vertex-openai-proxy
    spec:
      containers:
        - name: proxy
          image: quay.io/telco-coe-emea/vertex-openai-proxy:latest
          ports:
            - containerPort: 8080
              protocol: TCP
              name: http
          envFrom:
            - secretRef:
                name: vertex-openai-proxy-credentials
          env:
            - name: LITELLM_PORT
              value: "8080"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
